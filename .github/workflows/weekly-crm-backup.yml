name: Weekly CRM Backup

on:
  schedule:
    # Every Sunday at 6:00 AM UTC (midnight MST)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch CRM data from Supabase
        run: |
          mkdir -p steven-crm/backups
          
          SURL="https://malteiuhxsxrnxpyborf.supabase.co"
          SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hbHRlaXVoeHN4cm54cHlib3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwNjksImV4cCI6MjA5MjI4NTA2OX0.F5vbdTgcsveGZB5_BYpDWjdhoayba83mpi6CXLmUz90"
          DATE=$(date +%Y-%m-%d)
          
          echo "Fetching data from Supabase..."
          
          LEADS=$(curl -s "$SURL/rest/v1/leads?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          PROPS=$(curl -s "$SURL/rest/v1/properties?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          BUYERS=$(curl -s "$SURL/rest/v1/buyers?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          REALTORS=$(curl -s "$SURL/rest/v1/realtors?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          CONTACTS=$(curl -s "$SURL/rest/v1/contacts?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          INVESTORS=$(curl -s "$SURL/rest/v1/investors?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          FOLLOWUPS=$(curl -s "$SURL/rest/v1/followups?select=*" \
            -H "apikey: $SKEY" -H "Authorization: Bearer $SKEY")
          
          # Build JSON backup file
          cat > "steven-crm/backups/backup-$DATE.json" << EOF
          {
            "exported_at": "$DATE",
            "crm": "SK Home Solutions CRM",
            "data": {
              "leads": $LEADS,
              "properties": $PROPS,
              "buyers": $BUYERS,
              "realtors": $REALTORS,
              "contacts": $CONTACTS,
              "investors": $INVESTORS,
              "followups": $FOLLOWUPS
            }
          }
          EOF
          
          echo "Backup saved: backup-$DATE.json"
          
          # Keep only last 12 backups (3 months)
          cd steven-crm/backups
          ls -t backup-*.json | tail -n +13 | xargs -r rm
          echo "Old backups cleaned up."

      - name: Commit backup to repo
        run: |
          git config user.name "Jarvis CRM Bot"
          git config user.email "jarvis@skhomesolutions.com"
          git add steven-crm/backups/
          
          DATE=$(date +%Y-%m-%d)
          LEAD_COUNT=$(python3 -c "
          import json
          with open('steven-crm/backups/backup-$DATE.json') as f:
              d = json.load(f)
          print(len(d['data']['leads']))
          " 2>/dev/null || echo "?")
          
          git diff --staged --quiet || git commit -m "Auto-backup $DATE — $LEAD_COUNT leads"
          git push
