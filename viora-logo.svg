<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BF3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A674D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E57BA6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E57BA6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circuit pattern -->
  <g fill="none" stroke="url(#circuitGradient)" stroke-width="2" opacity="0.3">
    <!-- Top circuits -->
    <circle cx="200" cy="40" r="4" fill="url(#circuitGradient)"/>
    <line x1="200" y1="40" x2="220" y2="20"/>
    <line x1="200" y1="40" x2="180" y2="20"/>
    <line x1="200" y1="40" x2="200" y2="60"/>
    
    <!-- Side circuits -->
    <circle cx="160" cy="80" r="3" fill="url(#circuitGradient)"/>
    <line x1="160" y1="80" x2="140" y2="60"/>
    <line x1="160" y1="80" x2="160" y2="100"/>
    
    <circle cx="240" cy="80" r="3" fill="url(#circuitGradient)"/>
    <line x1="240" y1="80" x2="260" y2="60"/>
    <line x1="240" y1="80" x2="240" y2="100"/>
    
    <!-- Bottom circuits -->
    <circle cx="180" cy="140" r="3" fill="url(#circuitGradient)"/>
    <circle cx="200" cy="150" r="3" fill="url(#circuitGradient)"/>
    <circle cx="220" cy="140" r="3" fill="url(#circuitGradient)"/>
    <line x1="180" y1="140" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="220" y2="140"/>
    <line x1="180" y1="140" x2="180" y2="160"/>
    <line x1="200" y1="150" x2="200" y2="170"/>
    <line x1="220" y1="140" x2="220" y2="160"/>
  </g>
  
  <!-- Main logo text -->
  <text x="200" y="110" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="48" font-weight="300" text-anchor="middle" 
        fill="url(#logoGradient)" letter-spacing="-2px">viora</text>
</svg>