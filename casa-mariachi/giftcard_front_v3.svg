<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1013" height="638" viewBox="0 0 1013 638">
  <defs>
    <style><![CDATA[
      .bg{fill:#ffffff}
      .red{fill:#ff3b30}
      .orange{fill:#ff9800}
      .green{fill:#00b140}
      .title{font-family: 'Helvetica Neue', Arial, sans-serif; font-size:44px; fill:#2b2b2b}
      .tag{font-family: 'Georgia', serif; font-size:20px; fill:#444}
    ]]></style>
  </defs>
  <rect class="bg" x="0" y="0" width="1013" height="638" rx="32"/>
  <!-- top color band -->
  <rect x="0" y="0" width="1013" height="160" fill="#00b140" rx="0"/>
  <!-- logo centered in band -->
  <image href="./logo.png" x="56" y="10" height="140" preserveAspectRatio="xMidYMid meet"/>
  <!-- big central title -->
  <text x="400" y="350" class="title">GIFT CARD</text>
  <text x="400" y="400" class="tag">"mamacita needs a margarita"</text>
  <!-- footer color blocks -->
  <rect x="0" y="520" width="340" height="118" fill="#ff3b30"/>
  <rect x="340" y="520" width="333" height="118" fill="#ff9800"/>
  <rect x="673" y="520" width="340" height="118" fill="#ffd700"/>
  <rect x="6" y="6" width="1001" height="626" fill="none" stroke="#2b2b2b" stroke-width="8" rx="26"/>
</svg>