<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1013" height="638" viewBox="0 0 1013 638">
  <defs>
    <style><![CDATA[
      .bg{fill:#ff3b30}
      .accent{fill:#ffb300}
      .green{fill:#00b140}
      .white{fill:#ffffff}
      .logoText{font-family: 'Helvetica Neue', Arial, sans-serif; font-size:42px; fill:#ffffff}
      .tagline{font-family: 'Georgia', serif; font-size:24px; fill:#fff}
    ]]></style>
  </defs>
  <rect class="bg" x="0" y="0" width="1013" height="638" rx="32"/>
  <!-- bright yellow accent bottom -->
  <rect x="0" y="480" width="1013" height="158" fill="#ffd700" rx="0"/>
  <!-- left green stripe -->
  <rect x="0" y="0" width="140" height="638" fill="#00c853" rx="0"/>
  <!-- logo placed center-left -->
  <image href="./logo.png" x="70" y="90" height="360" preserveAspectRatio="xMidYMid meet"/>
  <!-- Tagline and label on right -->
  <text x="550" y="220" class="logoText">GIFT CARD</text>
  <text x="550" y="270" class="tagline">"mamacita needs a margarita"</text>
  <!-- white thin border -->
  <rect x="8" y="8" width="997" height="622" fill="none" stroke="#ffffff" stroke-width="8" rx="28"/>
</svg>