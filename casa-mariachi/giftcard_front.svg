<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1013" height="638" viewBox="0 0 1013 638">
  <defs>
    <style><![CDATA[
      .bg{fill:#b71c1c}
      .gold{fill:#d4a017}
      .tag{font-family: 'Helvetica Neue', Arial, sans-serif; font-size:36px; fill:#fff}
      .tagline{font-family: 'Georgia', serif; font-size:28px; fill:#ffd98a}
    ]]></style>
  </defs>
  <rect class="bg" x="0" y="0" width="1013" height="638" rx="32" ry="32"/>
  <!-- gold accent strip -->
  <rect x="0" y="480" width="1013" height="158" fill="#d4a017" rx="0"/>
  <!-- logo placed center-left -->
  <image href="./logo.png" x="90" y="70" height="420" preserveAspectRatio="xMinYMid meet"/>
  <!-- Tagline top-right -->
  <text x="560" y="170" class="tag">GIFT CARD</text>
  <text x="560" y="220" class="tagline">"mamacita needs a margarita"</text>
  <!-- decorative gold stroke around card -->
  <rect x="6" y="6" width="1001" height="626" fill="none" stroke="#ffd98a" stroke-width="12" rx="26"/>
</svg>