<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1013" height="638" viewBox="0 0 1013 638">
  <defs>
    <style><![CDATA[
      .bg{fill:#ffd54f}
      .accentR{fill:#ff3b30}
      .accentG{fill:#00b140}
      .white{fill:#ffffff}
      .logoText{font-family: 'Helvetica Neue', Arial, sans-serif; font-size:40px; fill:#8b0000}
      .tagline{font-family: 'Georgia', serif; font-size:22px; fill:#4a2b00}
    ]]></style>
  </defs>
  <rect class="bg" x="0" y="0" width="1013" height="638" rx="32"/>
  <!-- diagonal color ribbon -->
  <path d="M0 380 L1013 0 L1013 638 L0 638 Z" fill="#ff7043" opacity="0.95"/>
  <!-- logo centered top-left -->
  <image href="./logo.png" x="60" y="50" height="300" preserveAspectRatio="xMinYMid meet"/>
  <!-- right text -->
  <text x="560" y="200" class="logoText">GIFT CARD</text>
  <text x="560" y="250" class="tagline">"mamacita needs a margarita"</text>
  <!-- thin gold border -->
  <rect x="6" y="6" width="1001" height="626" fill="none" stroke="#d4a017" stroke-width="10" rx="26"/>
</svg>